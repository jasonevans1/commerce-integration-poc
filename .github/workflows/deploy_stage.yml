name: AIO App CI Stage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        node-version: ['22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup AIO CLI
        uses: adobe/aio-cli-setup-action@1.3.0

      - name: Auth
        uses: adobe/aio-apps-action@4.0.0
        with:
          command: oauth_sts
          CLIENTID: ${{ secrets.CLIENTID_STAGE }}
          CLIENTSECRET: ${{ secrets.CLIENTSECRET_STAGE }}
          TECHNICALACCOUNTID: ${{ secrets.TECHNICALACCID_STAGE }}
          TECHNICALACCOUNTEMAIL: ${{ secrets.TECHNICALACCOUNTEMAIL_STAGE }}
          IMSORGID: ${{ secrets.IMSORGID_STAGE }}
          SCOPES: ${{ secrets.SCOPES_STAGE }}

      - name: Build
        env:
          AIO_RUNTIME_NAMESPACE: ${{ secrets.AIO_RUNTIME_NAMESPACE_STAGE }}
        uses: adobe/aio-apps-action@4.0.0
        with:
          command: build

      - name: Deploy
        env:
          AIO_RUNTIME_NAMESPACE: ${{ secrets.AIO_RUNTIME_NAMESPACE_STAGE }}
          AIO_RUNTIME_AUTH: ${{ secrets.AIO_RUNTIME_AUTH_STAGE }}
          AIO_PROJECT_ID: ${{ secrets.AIO_PROJECT_ID_STAGE }}
          AIO_PROJECT_NAME: ${{ secrets.AIO_PROJECT_NAME_STAGE }}
          AIO_PROJECT_ORG_ID: ${{ secrets.AIO_PROJECT_ORG_ID_STAGE }}
          AIO_PROJECT_WORKSPACE_ID: ${{ secrets.AIO_PROJECT_WORKSPACE_ID_STAGE }}
          AIO_PROJECT_WORKSPACE_NAME: ${{ secrets.AIO_PROJECT_WORKSPACE_NAME_STAGE }}
          AIO_PROJECT_WORKSPACE_DETAILS_SERVICES: ${{ secrets.AIO_PROJECT_WORKSPACE_DETAILS_SERVICES_STAGE }}
          # App-specific vars — substituted into $VAR references in actions.config.yaml
          COMMERCE_BASE_URL: ${{ secrets.COMMERCE_BASE_URL }}
          COMMERCE_CONSUMER_KEY: ${{ secrets.COMMERCE_CONSUMER_KEY }}
          COMMERCE_CONSUMER_SECRET: ${{ secrets.COMMERCE_CONSUMER_SECRET }}
          COMMERCE_ACCESS_TOKEN: ${{ secrets.COMMERCE_ACCESS_TOKEN }}
          COMMERCE_ACCESS_TOKEN_SECRET: ${{ secrets.COMMERCE_ACCESS_TOKEN_SECRET }}
          COMMERCE_GRAPHQL_ENDPOINT: ${{ secrets.COMMERCE_GRAPHQL_ENDPOINT }}
          EVENT_PREFIX: ${{ secrets.EVENT_PREFIX }}
          IO_MANAGEMENT_BASE_URL: ${{ secrets.IO_MANAGEMENT_BASE_URL }}
          IO_CONSUMER_ID: ${{ secrets.IO_CONSUMER_ID }}
          IO_PROJECT_ID: ${{ secrets.IO_PROJECT_ID }}
          IO_WORKSPACE_ID: ${{ secrets.IO_WORKSPACE_ID }}
          OAUTH_CLIENT_ID: ${{ secrets.CLIENTID_STAGE }}
          OAUTH_CLIENT_SECRET: ${{ secrets.CLIENTSECRET_STAGE }}
          OAUTH_ORG_ID: ${{ secrets.IMSORGID_STAGE }}
          OAUTH_SCOPES: ${{ secrets.SCOPES_STAGE }}
          OAUTH_TECHNICAL_ACCOUNT_ID: ${{ secrets.TECHNICALACCID_STAGE }}
          OAUTH_TECHNICAL_ACCOUNT_EMAIL: ${{ secrets.TECHNICALACCOUNTEMAIL_STAGE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL_FROM: ${{ secrets.NOTIFICATION_EMAIL_FROM }}
          NOTIFICATION_EMAIL_TO: ${{ secrets.NOTIFICATION_EMAIL_TO }}
          EDS_STOREFRONT_URL: ${{ secrets.EDS_STOREFRONT_URL }}
          ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
        uses: adobe/aio-apps-action@4.0.0
        with:
          command: deploy
          noPublish: true
