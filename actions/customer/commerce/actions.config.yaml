consumer:
  function: consumer/index.js
  web: 'no'
  runtime: nodejs:22
  inputs:
    LOG_LEVEL: debug
    EVENT_PREFIX: $EVENT_PREFIX
    ENABLE_TELEMETRY: true
  annotations:
    require-adobe-auth: true
    final: true
